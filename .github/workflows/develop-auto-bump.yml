name: Develop Auto Version Bump

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  bump-and-build-develop-script:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Build develop userscript
        run: npm run build:develop

      - name: Sync Sonar version
        run: npm run sync:sonar

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json sonar-project.properties ff14-carbuncle-plushy-qol-develop.user.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(develop): auto bump userscript version"
          git push
